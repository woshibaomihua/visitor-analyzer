<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>阿里国际站访客分析工具</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      color: #333;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #ff6a00, #ff9a00);
      color: white;
      padding: 24px 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 22px; font-weight: 700; }
    header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }

    .drop-zone {
      border: 2.5px dashed #ff9a00;
      border-radius: 16px;
      background: white;
      padding: 60px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover { background: #fff8f0; border-color: #ff6a00; }
    .drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
    .drop-zone h2 { font-size: 18px; color: #555; }
    .drop-zone p { font-size: 13px; color: #999; margin-top: 8px; }
    .drop-zone input { display: none; }
    .btn-upload {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 28px;
      background: #ff6a00;
      color: white;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: none;
    }
    .btn-upload:hover { background: #e05c00; }

    .status {
      display: none;
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      margin-top: 20px;
      font-size: 14px;
      color: #555;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .status.show { display: block; }

    .results { display: none; margin-top: 28px; }
    .results.show { display: block; }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card .num { font-size: 32px; font-weight: 700; color: #ff6a00; }
    .card .label { font-size: 12px; color: #888; margin-top: 6px; }

    .section {
      background: white;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-header h3 { font-size: 16px; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    /* 可排序表头 */
    thead th {
      background: #fff8f0;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      color: #666;
      border-bottom: 2px solid #ffe0b2;
      white-space: nowrap;
    }
    thead th.sortable {
      cursor: pointer;
      user-select: none;
    }
    thead th.sortable:hover { background: #ffe8cc; color: #e06000; }
    thead th .sort-icon {
      display: inline-block;
      margin-left: 4px;
      font-size: 11px;
      opacity: 0.4;
    }
    thead th.sort-asc .sort-icon::after  { content: '▲'; opacity: 1; color: #ff6a00; }
    thead th.sort-desc .sort-icon::after { content: '▼'; opacity: 1; color: #ff6a00; }
    thead th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: '⇅'; }

    tbody tr:hover { background: #fffaf5; }
    tbody td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #444; }

    /* 关键词复制 */
    .word-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border: none;
      background: none;
      cursor: pointer;
      color: #bbb;
      border-radius: 4px;
      flex-shrink: 0;
      transition: all 0.15s;
      padding: 0;
    }
    .copy-btn:hover { color: #ff6a00; background: #fff0e0; }
    .copy-btn.copied { color: #4caf50; }
    .copy-btn svg { width: 13px; height: 13px; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-high { background: #fff0e0; color: #e06000; }
    .badge-mid  { background: #e8f5e9; color: #388e3c; }
    .badge-low  { background: #f5f5f5; color: #999; }

    .conv-bar { display: flex; align-items: center; gap: 8px; }
    .conv-bar .bar-bg {
      flex: 1;
      height: 6px;
      background: #f0f0f0;
      border-radius: 3px;
      overflow: hidden;
      min-width: 50px;
    }
    .conv-bar .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff9a00, #ff6a00);
      border-radius: 3px;
    }
    .conv-bar span { font-size: 12px; color: #666; min-width: 38px; text-align: right; }

    .btn-download {
      padding: 7px 18px;
      background: #ff6a00;
      color: white;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      border: none;
    }
    .btn-download:hover { background: #e05c00; }

    /* 国家中文名 */
    .country-zh { font-size: 11px; color: #999; margin-left: 2px; }
  </style>
</head>
<body>
<header>
  <h1>🛒 阿里国际站访客分析工具</h1>
  <p>上传访客详情 Excel，一键分析商机词 & 高转化国家</p>
</header>

<div class="container">
  <div class="drop-zone" id="dropZone">
    <div class="icon">📊</div>
    <h2>拖入访客详情 Excel 文件</h2>
    <p>支持 .xlsx / .xls 格式 · 数据仅在本地处理，不会上传服务器</p>
    <label class="btn-upload" for="fileInput">选择文件</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
  </div>

  <div class="status" id="status">⏳ 正在解析数据...</div>

  <div class="results" id="results">
    <div class="summary-cards" id="summaryCards"></div>

    <!-- 商机词 -->
    <div class="section">
      <div class="section-header">
        <h3>🔑 商机词汇总（进店来源词）</h3>
        <button class="btn-download" onclick="downloadCSV('words')">下载 CSV</button>
      </div>
      <table id="wordsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>关键词</th>
            <th class="sortable" data-table="words" data-key="cnt">访客数<span class="sort-icon"></span></th>
            <th class="sortable" data-table="words" data-key="inq">询盘<span class="sort-icon"></span></th>
            <th class="sortable" data-table="words" data-key="tm">TM咨询<span class="sort-icon"></span></th>
            <th class="sortable" data-table="words" data-key="conv">转化率<span class="sort-icon"></span></th>
            <th class="sortable" data-table="words" data-key="convScore">潜力<span class="sort-icon"></span></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 高转化国家 -->
    <div class="section">
      <div class="section-header">
        <h3>🌍 高转化国家分析</h3>
        <button class="btn-download" onclick="downloadCSV('countries')">下载 CSV</button>
      </div>
      <table id="countriesTable">
        <thead>
          <tr>
            <th>#</th>
            <th>国家</th>
            <th class="sortable" data-table="countries" data-key="cnt">访客数<span class="sort-icon"></span></th>
            <th class="sortable" data-table="countries" data-key="inq">询盘<span class="sort-icon"></span></th>
            <th class="sortable" data-table="countries" data-key="tm">TM咨询<span class="sort-icon"></span></th>
            <th class="sortable" data-table="countries" data-key="l1">L1+买家<span class="sort-icon"></span></th>
            <th class="sortable" data-table="countries" data-key="conv">转化率<span class="sort-icon"></span></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ===== 国家英文→中文映射 =====
const countryZH = {
  'United States':'美国','China':'中国','India':'印度','United Kingdom':'英国',
  'Germany':'德国','France':'法国','Brazil':'巴西','Canada':'加拿大',
  'Australia':'澳大利亚','Japan':'日本','South Korea':'韩国','Mexico':'墨西哥',
  'Italy':'意大利','Spain':'西班牙','Netherlands':'荷兰','Russia':'俄罗斯',
  'Turkey':'土耳其','Saudi Arabia':'沙特阿拉伯','UAE':'阿联酋',
  'United Arab Emirates':'阿联酋','Pakistan':'巴基斯坦','Bangladesh':'孟加拉国',
  'Egypt':'埃及','Nigeria':'尼日利亚','South Africa':'南非','Indonesia':'印度尼西亚',
  'Malaysia':'马来西亚','Thailand':'泰国','Vietnam':'越南','Philippines':'菲律宾',
  'Singapore':'新加坡','Argentina':'阿根廷','Chile':'智利','Colombia':'哥伦比亚',
  'Peru':'秘鲁','Poland':'波兰','Ukraine':'乌克兰','Sweden':'瑞典',
  'Norway':'挪威','Denmark':'丹麦','Finland':'芬兰','Belgium':'比利时',
  'Switzerland':'瑞士','Austria':'奥地利','Portugal':'葡萄牙','Greece':'希腊',
  'Czech Republic':'捷克','Romania':'罗马尼亚','Hungary':'匈牙利',
  'Israel':'以色列','Iran':'伊朗','Iraq':'伊拉克','Kuwait':'科威特',
  'Qatar':'卡塔尔','Oman':'阿曼','Jordan':'约旦','Lebanon':'黎巴嫩',
  'Morocco':'摩洛哥','Algeria':'阿尔及利亚','Tunisia':'突尼斯','Kenya':'肯尼亚',
  'Ghana':'加纳','Ethiopia':'埃塞俄比亚','Tanzania':'坦桑尼亚','Cameroon':'喀麦隆',
  'New Zealand':'新西兰','Taiwan':'台湾','Hong Kong':'香港','Macau':'澳门',
  'Sri Lanka':'斯里兰卡','Nepal':'尼泊尔','Myanmar':'缅甸','Cambodia':'柬埔寨',
  'Kazakhstan':'哈萨克斯坦','Uzbekistan':'乌兹别克斯坦','Azerbaijan':'阿塞拜疆',
  'Georgia':'格鲁吉亚','Belarus':'白俄罗斯','Serbia':'塞尔维亚',
  'Croatia':'克罗地亚','Slovakia':'斯洛伐克','Bulgaria':'保加利亚',
  'Lithuania':'立陶宛','Latvia':'拉脱维亚','Estonia':'爱沙尼亚',
  'Ecuador':'厄瓜多尔','Bolivia':'玻利维亚','Paraguay':'巴拉圭',
  'Uruguay':'乌拉圭','Venezuela':'委内瑞拉','Guatemala':'危地马拉',
  'Honduras':'洪都拉斯','Dominican Republic':'多米尼加','Cuba':'古巴',
  'Puerto Rico':'波多黎各','Jamaica':'牙买加','Trinidad and Tobago':'特立尼达和多巴哥',
  'Senegal':'塞内加尔','Ivory Coast':'科特迪瓦','Angola':'安哥拉',
  'Mozambique':'莫桑比克','Zambia':'赞比亚','Zimbabwe':'津巴布韦',
  'Sudan':'苏丹','Libya':'利比亚','Somalia':'索马里',
};

function getZH(name) {
  return countryZH[name] || countryZH[name.trim()] || '';
}

// ===== 排序状态 =====
const sortState = {
  words:     { key: 'cnt', dir: 'desc' },
  countries: { key: 'conv', dir: 'desc' },
};

let wordData = [], countryData = [];

// ===== 拖拽上传 =====
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});
document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  const status = document.getElementById('status');
  status.textContent = `⏳ 正在解析「${file.name}」...`;
  status.classList.add('show');
  document.getElementById('results').classList.remove('show');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      analyze(rows);
    } catch(err) {
      status.textContent = '❌ 文件解析失败，请检查格式是否正确';
    }
  };
  reader.readAsArrayBuffer(file);
}

// ===== 分析 =====
function analyze(rows) {
  const header = rows[0];
  const colIdx = (keywords) => {
    for (const kw of keywords) {
      const idx = header.findIndex(h => String(h).includes(kw));
      if (idx >= 0) return idx;
    }
    return -1;
  };

  const iCountry    = colIdx(['国家', '地区']);
  const iEntryWord  = colIdx(['进店来源词', '来源词', '商机词']);
  const iInquiry    = colIdx(['询盘']);
  const iTM         = colIdx(['TM', 'IM咨询']);
  const iBuyerLevel = colIdx(['买家等级', '等级']);

  const wordCount = {}, wordInq = {}, wordTM = {};
  const cntCount = {}, cntInq = {}, cntTM = {}, cntL1 = {};
  let totalVisitors = 0, totalInq = 0, totalTM = 0;
  const skipWords = new Set(['notag','c','b','none','- - -','-','','null']);

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.every(c => c === '')) continue;
    totalVisitors++;
    const inq = String(row[iInquiry] || '').trim() === '是';
    const tm  = String(row[iTM] || '').trim() === '是';
    if (inq) totalInq++;
    if (tm) totalTM++;

    if (iEntryWord >= 0) {
      const raw = String(row[iEntryWord] || '').trim();
      if (!skipWords.has(raw.toLowerCase())) {
        raw.split(/(?<=[a-z])(?=[A-Z])/).forEach(w => {
          w = w.trim();
          if (w.length > 3 && !skipWords.has(w.toLowerCase())) {
            wordCount[w] = (wordCount[w] || 0) + 1;
            if (inq) wordInq[w] = (wordInq[w] || 0) + 1;
            if (tm)  wordTM[w]  = (wordTM[w]  || 0) + 1;
          }
        });
      }
    }

    if (iCountry >= 0) {
      const c = String(row[iCountry] || '').trim();
      if (c && c.toLowerCase() !== 'none') {
        cntCount[c] = (cntCount[c] || 0) + 1;
        if (inq) cntInq[c] = (cntInq[c] || 0) + 1;
        if (tm)  cntTM[c]  = (cntTM[c]  || 0) + 1;
        if (iBuyerLevel >= 0 && String(row[iBuyerLevel] || '').includes('L1'))
          cntL1[c] = (cntL1[c] || 0) + 1;
      }
    }
  }

  wordData = Object.entries(wordCount)
    .map(([w, cnt]) => {
      const inq = wordInq[w]||0, tm = wordTM[w]||0;
      const conv = (inq + tm) / cnt * 100;
      return { word: w, cnt, inq, tm, conv, convScore: conv >= 10 ? 2 : conv >= 3 ? 1 : 0 };
    })
    .slice(0, 50);

  countryData = Object.entries(cntCount)
    .filter(([,cnt]) => cnt >= 3)
    .map(([c, cnt]) => {
      const inq = cntInq[c]||0, tm = cntTM[c]||0;
      return { country: c, zh: getZH(c), cnt, inq, tm, l1: cntL1[c]||0, conv: (inq+tm)/cnt*100 };
    })
    .slice(0, 50);

  renderSummary(totalVisitors, totalInq, totalTM, Object.keys(wordCount).length, Object.keys(cntCount).length);

  sortState.words     = { key: 'cnt',  dir: 'desc' };
  sortState.countries = { key: 'conv', dir: 'desc' };
  renderWords();
  renderCountries();
  updateSortIcons('words');
  updateSortIcons('countries');

  document.getElementById('status').classList.remove('show');
  document.getElementById('results').classList.add('show');
}

// ===== 渲染汇总卡片 =====
function renderSummary(visitors, inq, tm, words, countries) {
  const conv = visitors > 0 ? ((inq + tm) / visitors * 100).toFixed(1) : 0;
  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="num">${visitors.toLocaleString()}</div><div class="label">总访客数</div></div>
    <div class="card"><div class="num">${inq}</div><div class="label">询盘数</div></div>
    <div class="card"><div class="num">${tm}</div><div class="label">TM咨询数</div></div>
    <div class="card"><div class="num">${conv}%</div><div class="label">综合转化率</div></div>
    <div class="card"><div class="num">${words}</div><div class="label">商机词总数</div></div>
    <div class="card"><div class="num">${countries}</div><div class="label">访客来源国家</div></div>
  `;
}

// ===== 复制图标 SVG =====
const copySVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
</svg>`;
const checkSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="20 6 9 17 4 12"/>
</svg>`;

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = checkSVG;
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = copySVG; btn.classList.remove('copied'); }, 1500);
  });
}

// ===== 渲染商机词表格 =====
function renderWords() {
  const { key, dir } = sortState.words;
  const sorted = [...wordData].sort((a, b) => dir === 'desc' ? b[key] - a[key] : a[key] - b[key]);
  const maxConv = Math.max(...sorted.map(d => d.conv), 1);
  const tbody = document.querySelector('#wordsTable tbody');
  tbody.innerHTML = sorted.map((d, i) => {
    const badge = d.conv >= 10 ? '<span class="badge badge-high">高潜力</span>'
                : d.conv >= 3  ? '<span class="badge badge-mid">中潜力</span>'
                : '<span class="badge badge-low">待培育</span>';
    return `<tr>
      <td>${i+1}</td>
      <td>
        <div class="word-cell">
          <strong>${d.word}</strong>
          <button class="copy-btn" onclick="copyText(this,'${d.word.replace(/'/g,"\\'")}');" title="复制关键词">${copySVG}</button>
        </div>
      </td>
      <td>${d.cnt}</td>
      <td>${d.inq}</td>
      <td>${d.tm}</td>
      <td>
        <div class="conv-bar">
          <div class="bar-bg"><div class="bar-fill" style="width:${d.conv/maxConv*100}%"></div></div>
          <span>${d.conv.toFixed(1)}%</span>
        </div>
      </td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
}

// ===== 渲染国家表格 =====
function renderCountries() {
  const { key, dir } = sortState.countries;
  const sorted = [...countryData].sort((a, b) => dir === 'desc' ? b[key] - a[key] : a[key] - b[key]);
  const maxConv = Math.max(...sorted.map(d => d.conv), 1);
  const tbody = document.querySelector('#countriesTable tbody');
  tbody.innerHTML = sorted.map((d, i) => `<tr>
    <td>${i+1}</td>
    <td>
      <strong>${d.country}</strong>
      ${d.zh ? `<span class="country-zh">（${d.zh}）</span>` : ''}
    </td>
    <td>${d.cnt}</td>
    <td>${d.inq}</td>
    <td>${d.tm}</td>
    <td>${d.l1 || 0}</td>
    <td>
      <div class="conv-bar">
        <div class="bar-bg"><div class="bar-fill" style="width:${d.conv/maxConv*100}%"></div></div>
        <span>${d.conv.toFixed(1)}%</span>
      </div>
    </td>
  </tr>`).join('');
}

// ===== 排序逻辑 =====
function updateSortIcons(table) {
  const { key, dir } = sortState[table];
  document.querySelectorAll(`#${table === 'words' ? 'wordsTable' : 'countriesTable'} thead th.sortable`).forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.key === key) {
      th.classList.add(dir === 'desc' ? 'sort-desc' : 'sort-asc');
    }
  });
}

document.addEventListener('click', e => {
  const th = e.target.closest('th.sortable');
  if (!th) return;
  const table = th.dataset.table;
  const key   = th.dataset.key;
  if (sortState[table].key === key) {
    sortState[table].dir = sortState[table].dir === 'desc' ? 'asc' : 'desc';
  } else {
    sortState[table] = { key, dir: 'desc' };
  }
  if (table === 'words') renderWords();
  else renderCountries();
  updateSortIcons(table);
});

// ===== 下载 CSV =====
function downloadCSV(type) {
  let csv = '', filename = '';
  const { key, dir } = sortState[type === 'words' ? 'words' : 'countries'];
  if (type === 'words') {
    const sorted = [...wordData].sort((a,b) => dir==='desc' ? b[key]-a[key] : a[key]-b[key]);
    csv = '排名,关键词,访客数,询盘,TM咨询,转化率,潜力\n';
    csv += sorted.map((d,i) => {
      const pot = d.conv>=10?'高潜力':d.conv>=3?'中潜力':'待培育';
      return `${i+1},"${d.word}",${d.cnt},${d.inq},${d.tm},${d.conv.toFixed(1)}%,${pot}`;
    }).join('\n');
    filename = '商机词分析.csv';
  } else {
    const sorted = [...countryData].sort((a,b) => dir==='desc' ? b[key]-a[key] : a[key]-b[key]);
    csv = '排名,国家,中文名,访客数,询盘,TM咨询,L1+买家,转化率\n';
    csv += sorted.map((d,i) =>
      `${i+1},"${d.country}","${d.zh||''}",${d.cnt},${d.inq},${d.tm},${d.l1},${d.conv.toFixed(1)}%`
    ).join('\n');
    filename = '高转化国家分析.csv';
  }
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
